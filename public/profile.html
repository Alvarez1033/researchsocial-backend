<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — ResearchSocial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);--text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);--s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s12:3rem;--s16:4rem;--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;--tr:180ms cubic-bezier(.16,1,.3,1);--font:'Inter',sans-serif;--font-d:'DM Serif Display',Georgia,serif;}
:root,[data-theme="light"]{--bg:#f0f2f5;--surface:#fff;--off:#eef0f3;--dyn:#e2e5ea;--div:#dde0e5;--bdr:#cdd1d8;--text:#1a1d23;--muted:#636878;--faint:#a8adb8;--inv:#fff;--pri:#4f46e5;--pri-h:#3730a3;--pri-hl:#e0e7ff;--suc:#16a34a;--err:#dc2626;--sh-md:0 4px 16px rgba(0,0,0,.1);--sh-card:0 2px 8px rgba(0,0,0,.06);}
[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--off:#21262d;--dyn:#2d333b;--div:#30363d;--bdr:#3d444d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--inv:#0d1117;--pri:#818cf8;--pri-h:#a5b4fc;--pri-hl:#1e1b4b;--suc:#4ade80;--err:#f87171;--sh-md:0 4px 16px rgba(0,0,0,.4);--sh-card:0 2px 8px rgba(0,0,0,.25);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background:var(--bg);transition:background .3s,color .3s;}
img,svg{display:block;max-width:100%;}button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}a{color:inherit;text-decoration:none;}input,textarea{font:inherit;color:inherit;}
:focus-visible{outline:2px solid var(--pri);outline-offset:3px;border-radius:var(--r-sm);}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) var(--s6);background:var(--surface);border-bottom:1px solid var(--div);position:sticky;top:0;z-index:100;}
.nav-left{display:flex;align-items:center;gap:var(--s4);}
.nav-back{display:flex;align-items:center;gap:var(--s2);font-size:var(--text-sm);font-weight:500;color:var(--muted);padding:var(--s2) var(--s3);border-radius:var(--r-md);transition:all var(--tr);}
.nav-back:hover{background:var(--off);color:var(--text);}
.nav-logo{display:flex;align-items:center;gap:var(--s2);font-family:var(--font-d);font-size:var(--text-lg);font-weight:700;}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);color:var(--muted);transition:all var(--tr);}
.btn-icon:hover{background:var(--off);color:var(--text);}
.page{max-width:1060px;margin:0 auto;padding:var(--s8) var(--s6);}
.profile-grid{display:grid;grid-template-columns:300px 1fr;gap:var(--s8);align-items:start;}
.profile-card{background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);overflow:hidden;position:sticky;top:76px;box-shadow:var(--sh-card);}
.profile-banner{height:96px;}
.profile-avatar-wrap{position:absolute;bottom:-32px;left:var(--s6);}
.profile-avatar{width:72px;height:72px;border-radius:var(--r-full);border:3px solid var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:var(--text-lg);font-weight:800;color:white;}
.profile-body{padding:var(--s12) var(--s6) var(--s6);position:relative;}
.profile-name{font-size:var(--text-lg);font-weight:800;font-family:var(--font-d);}
.profile-handle{font-size:var(--text-sm);color:var(--muted);}
.profile-title{font-size:var(--text-sm);color:var(--muted);margin-top:var(--s2);}
.profile-aff{font-size:var(--text-sm);font-weight:600;color:var(--pri);}
.profile-bio{font-size:var(--text-sm);color:var(--muted);line-height:1.65;margin-top:var(--s4);}
.profile-meta{display:flex;flex-wrap:wrap;gap:var(--s3);margin-top:var(--s4);}
.meta-item{display:flex;align-items:center;gap:var(--s2);font-size:var(--text-xs);color:var(--faint);}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s3);margin-top:var(--s5);padding-top:var(--s5);border-top:1px solid var(--div);}
.stat{text-align:center;}.stat-val{font-size:var(--text-base);font-weight:800;font-family:var(--font-d);color:var(--text);line-height:1;}.stat-lbl{font-size:var(--text-xs);color:var(--faint);margin-top:4px;}
.profile-actions{display:flex;gap:var(--s3);margin-top:var(--s5);}
.btn-follow-lg{flex:1;display:flex;align-items:center;justify-content:center;padding:var(--s3);border-radius:var(--r-full);font-size:var(--text-sm);font-weight:700;background:var(--pri);color:var(--inv);transition:all var(--tr);}
.btn-follow-lg:hover{background:var(--pri-h);transform:translateY(-1px);}
.btn-follow-lg.following{background:var(--off);color:var(--text);border:1.5px solid var(--bdr);}
.btn-follow-lg.following:hover{border-color:var(--err);color:var(--err);}
[data-theme="dark"] .btn-follow-lg:not(.following){color:#0d1117;}
.btn-msg{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);border:1.5px solid var(--bdr);color:var(--muted);transition:all var(--tr);}
.btn-msg:hover{border-color:var(--pri);color:var(--pri);}
.collab-row{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) var(--s4);background:var(--off);border-radius:var(--r-lg);margin-top:var(--s4);}
.collab-lbl{font-size:var(--text-xs);font-weight:600;color:var(--muted);}
.collab-status{font-size:var(--text-xs);font-weight:700;}.collab-status.open{color:var(--suc);}
.interests{display:flex;flex-wrap:wrap;gap:var(--s2);margin-top:var(--s4);}
.chip{font-size:var(--text-xs);font-weight:500;padding:var(--s1) var(--s3);border-radius:var(--r-full);background:var(--pri-hl);color:var(--pri);}
.badges-grid{display:flex;flex-wrap:wrap;gap:var(--s3);margin-top:var(--s4);}
.badge-item{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);background:var(--off);border:1px solid var(--div);border-radius:var(--r-lg);font-size:var(--text-xs);font-weight:600;transition:all var(--tr);}
.badge-item:hover{border-color:var(--pri);background:var(--pri-hl);}
.sec-tabs{display:flex;gap:var(--s1);background:var(--off);border-radius:var(--r-full);padding:var(--s1);margin-bottom:var(--s5);}
.sec-tab{padding:var(--s2) var(--s4);border-radius:var(--r-full);font-size:var(--text-sm);font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--tr);}
.sec-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.post-card{background:var(--surface);border:1px solid var(--div);border-radius:var(--r-xl);padding:var(--s5);margin-bottom:var(--s4);transition:all var(--tr);box-shadow:var(--sh-card);}
.post-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.type-badge{font-size:var(--text-xs);font-weight:600;padding:3px 10px;border-radius:var(--r-full);letter-spacing:.04em;text-transform:uppercase;}
.b-proposal{background:#dbeafe;color:#1d4ed8;}[data-theme="dark"] .b-proposal{background:#1e3a5f;color:#60a5fa;}
.b-study{background:#d1fae5;color:#065f46;}[data-theme="dark"] .b-study{background:#14532d;color:#34d399;}
.b-review{background:#fef3c7;color:#92400e;}[data-theme="dark"] .b-review{background:#451a03;color:#fbbf24;}
.b-findings{background:#ede9fe;color:#5b21b6;}[data-theme="dark"] .b-findings{background:#2e1065;color:#a78bfa;}
.b-discussion{background:#f3f4f6;color:#374151;}[data-theme="dark"] .b-discussion{background:#1f2937;color:#9ca3af;}
.post-title{font-size:var(--text-base);font-weight:700;font-family:var(--font-d);margin-bottom:var(--s2);}
.post-excerpt{font-size:var(--text-sm);color:var(--muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.post-tags{display:flex;flex-wrap:wrap;gap:var(--s2);margin:var(--s3) 0;}
.tag{font-size:var(--text-xs);font-weight:500;padding:2px 10px;border-radius:var(--r-full);}
.post-footer{display:flex;align-items:center;justify-content:space-between;padding-top:var(--s4);border-top:1px solid var(--div);}
.skeleton{background:var(--dyn);border-radius:var(--r-md);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.site-footer{text-align:center;padding:var(--s8);color:var(--faint);font-size:var(--text-xs);border-top:1px solid var(--div);margin-top:var(--s16);}
.site-footer a{color:var(--pri);}
@media(max-width:860px){.profile-grid{grid-template-columns:1fr;}.profile-card{position:static;}}
@media(max-width:600px){.page{padding:var(--s4);}.navbar{padding:var(--s3) var(--s4);}}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-left">
    <a href="/" class="nav-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>Feed</a>
    <a href="/" class="nav-logo">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="var(--pri)"/><circle cx="11" cy="11" r="4.5" stroke="white" stroke-width="2" fill="none"/><circle cx="21" cy="11" r="4.5" stroke="white" stroke-width="2" fill="none" opacity=".6"/><circle cx="16" cy="21" r="4.5" stroke="white" stroke-width="2" fill="none" opacity=".8"/></svg>
      <span>ResearchSocial</span>
    </a>
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <button class="btn-icon" data-theme-toggle><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <div id="navUser" style="font-size:13px;font-weight:600;color:var(--muted)"></div>
  </div>
</nav>

<div class="page">
  <div id="profileContent"><div style="text-align:center;padding:80px;color:var(--muted)">Loading profile…</div></div>
</div>

<footer class="site-footer"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a></footer>

<script src="/socket.io/socket.io.js"></script>
<script src="/api.js"></script>
<script>
(function(){const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;let d=localStorage.getItem('rs_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');r.setAttribute('data-theme',d);upd(d);t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);localStorage.setItem('rs_theme',d);upd(d);});function upd(v){t.innerHTML=v==='dark'?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;};})();

const HANDLE = window.location.pathname.split('/').pop();
const me = Auth.getUser();
if (me) document.getElementById('navUser').innerHTML = `<a href="/profile/${me.handle}" style="color:var(--pri)">@${esc(me.handle)}</a>`;

async function loadProfile() {
  try {
    const user = await API.getUser(HANDLE);
    document.title = user.name + ' — ResearchSocial';
    const isMe = me && me.handle === user.handle;
    const color2 = user.color ? user.color + '88' : '#818cf888';

    document.getElementById('profileContent').innerHTML = `
    <div class="profile-grid">
      <div>
        <div class="profile-card">
          <div class="profile-banner" style="background:linear-gradient(135deg,${user.color||'#818cf8'} 0%,${color2} 100%);position:relative;">
            <div class="profile-avatar-wrap" style="position:absolute;bottom:-32px;left:24px;">
              <div class="profile-avatar" style="background:${user.color||'#818cf8'}">
                ${user.avatar_url ? `<img src="${esc(user.avatar_url)}" style="width:100%;height:100%;object-fit:cover;" alt="">` : `<span style="font-size:22px;font-weight:800;color:white">${esc(user.initials||'?')}</span>`}
              </div>
            </div>
          </div>
          <div class="profile-body">
            <div class="profile-name">${esc(user.name)} ${user.is_verified?'<span style="color:var(--pri);font-size:14px" title="Verified researcher">✓</span>':''}</div>
            <div class="profile-handle">@${esc(user.handle)}</div>
            ${user.title ? `<div class="profile-title">${esc(user.title)}</div>` : ''}
            ${user.affiliation ? `<div class="profile-aff">${esc(user.affiliation)}</div>` : ''}
            ${user.bio ? `<p class="profile-bio">${esc(user.bio)}</p>` : ''}
            <div class="profile-meta">
              ${user.location ? `<span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(user.location)}</span>` : ''}
              ${user.website ? `<a href="${esc(user.website)}" target="_blank" class="meta-item" style="color:var(--pri)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Website</a>` : ''}
              ${user.created_at ? `<span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Joined ${new Date(user.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>` : ''}
            </div>
            <div class="profile-stats">
              <div class="stat"><div class="stat-val">${fmtNum(user.followers_count||0)}</div><div class="stat-lbl">Followers</div></div>
              <div class="stat"><div class="stat-val">${fmtNum(user.following_count||0)}</div><div class="stat-lbl">Following</div></div>
              <div class="stat"><div class="stat-val">${fmtNum(user.papers_count||0)}</div><div class="stat-lbl">Papers</div></div>
            </div>
            ${!isMe ? `
            <div class="profile-actions">
              <button class="btn-follow-lg ${user.is_following?'following':''}" id="followBtn" onclick="toggleFollow('${esc(user.handle)}')">
                ${user.is_following ? '✓ Following' : '+ Follow'}
              </button>
              <a href="/messages?with=${esc(user.id)}" class="btn-msg" title="Message @${esc(user.handle)}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </a>
            </div>` : '<div style="margin-top:var(--s5);font-size:var(--text-xs);color:var(--muted)">This is your profile.</div>'}
            <div class="collab-row">
              <div><div class="collab-lbl">Open to Collaborate</div><div class="collab-status ${user.open_to_collab?'open':''}">${user.open_to_collab?'Open':'Closed'}</div></div>
              <span style="font-size:18px">${user.open_to_collab?'🤝':'🔒'}</span>
            </div>
            ${user.interests?.length ? `<div class="interests">${user.interests.map(i=>`<span class="chip">${esc(i)}</span>`).join('')}</div>` : ''}
          </div>
        </div>

        <!-- Badges -->
        <div style="margin-top:var(--s6)">
          <div style="font-size:var(--text-sm);font-weight:700;margin-bottom:var(--s4)">Badges</div>
          <div class="badges-grid">
            ${user.is_verified ? '<div class="badge-item">✓ <span>Verified Researcher</span></div>' : ''}
            ${user.followers_count >= 500 ? '<div class="badge-item">🌟 <span>Rising Star</span></div>' : ''}
            ${user.papers_count >= 10 ? '<div class="badge-item">📚 <span>Prolific Author</span></div>' : ''}
            ${user.open_to_collab ? '<div class="badge-item">🤝 <span>Collaboration Star</span></div>' : ''}
            <div class="badge-item">🌱 <span>Early Researcher</span></div>
            ${user.citations_count >= 1000 ? '<div class="badge-item">📖 <span>Highly Cited</span></div>' : ''}
          </div>
        </div>
      </div>

      <!-- Right: Posts -->
      <div>
        <div class="sec-tabs">
          <button class="sec-tab active" onclick="showTab('posts',this)">Posts (${(user.posts||[]).length})</button>
          <button class="sec-tab" onclick="showTab('about',this)">About</button>
        </div>
        <div id="tab-posts">
          ${(user.posts||[]).length ? user.posts.map(p=>`
          <div class="post-card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <span class="type-badge b-${p.type}">${p.type}</span>
              <span style="font-size:11px;color:var(--faint)">${fmtTime(p.created_at)}</span>
              ${p.is_pinned?'<span style="font-size:11px;color:var(--warn)">📌 Pinned</span>':''}
              ${p.is_featured?'<span style="font-size:11px;color:var(--pri)">⭐ Featured</span>':''}
            </div>
            <div class="post-title">${esc(p.title)}</div>
            <p class="post-excerpt">${esc(p.excerpt)}</p>
            ${p.tags?.length?`<div class="post-tags">${p.tags.filter(t=>t&&t.name).map(t=>`<span class="tag" style="background:${t.color||'#818cf8'}22;color:${t.color||'#818cf8'}">#${esc(t.name)}</span>`).join('')}</div>`:''}
            <div class="post-footer">
              <div style="display:flex;gap:16px;font-size:13px;color:var(--muted)">
                <span>❤️ ${fmtNum(p.likes_count)}</span>
                <span>💬 ${fmtNum(p.comments_count)}</span>
              </div>
              <a href="/" style="font-size:12px;color:var(--pri)">View in feed →</a>
            </div>
          </div>`).join('') : '<div style="text-align:center;padding:60px;color:var(--muted)">No posts yet.</div>'}
        </div>
        <div id="tab-about" style="display:none;">
          <div class="post-card">
            <div style="font-size:var(--text-sm);font-weight:700;margin-bottom:var(--s4)">Research Stats</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)">
              ${[['Papers',user.papers_count||0],['Citations',user.citations_count||0],['Followers',user.followers_count||0],['Posts',user.posts?.length||0]].map(([l,v])=>`<div style="background:var(--off);border-radius:var(--r-lg);padding:var(--s4);text-align:center"><div style="font-size:var(--text-xl);font-weight:800;font-family:var(--font-d);color:var(--pri)">${fmtNum(v)}</div><div style="font-size:var(--text-xs);color:var(--faint);margin-top:4px">${l}</div></div>`).join('')}
            </div>
            ${user.affiliation?`<div style="margin-top:var(--s5);padding-top:var(--s5);border-top:1px solid var(--div)"><div style="font-size:var(--text-sm);font-weight:700;margin-bottom:var(--s2)">Affiliation</div><div style="font-size:var(--text-sm);color:var(--muted)">${esc(user.affiliation)}</div></div>`:''}
          </div>
        </div>
      </div>
    </div>`;
  } catch(e) {
    document.getElementById('profileContent').innerHTML = `<div style="text-align:center;padding:80px;color:var(--muted)">Profile not found: ${esc(e.message)}</div>`;
  }
}

function showTab(tab, btn) {
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-posts').style.display = tab==='posts'?'':'none';
  document.getElementById('tab-about').style.display = tab==='about'?'':'none';
}

async function toggleFollow(handle) {
  if (!Auth.isLoggedIn()) { showToast('Sign in to follow researchers'); return; }
  try {
    const res = await API.followUser(handle);
    const btn = document.getElementById('followBtn');
    btn.classList.toggle('following', res.following);
    btn.textContent = res.following ? '✓ Following' : '+ Follow';
    showToast(res.following ? `✅ Following @${handle}` : `Unfollowed @${handle}`);
  } catch(e) { showToast('⚠️ ' + e.message); }
}

loadProfile();
</script>
</body>
</html>
